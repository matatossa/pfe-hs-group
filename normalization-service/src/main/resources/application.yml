server:
  port: 8082

spring:
  application:
    name: normalization-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/security_platform}
    username: ${SPRING_DATASOURCE_USERNAME:secadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:secpassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Kafka Consumer Configuration ─────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: normalization-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

# ── Kafka Topics ─────────────────────────────────
kafka:
  topic:
    raw-feeds: raw-feed-items
    normalized-vulnerabilities: normalized-vulnerabilities

# ── Filtering Service ────────────────────────────
services:
  filtering-url: ${FILTERING_SERVICE_URL:http://localhost:5000}

# ── Actuator ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.security.platform.normalization: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN

# ── Eureka Client ─────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
