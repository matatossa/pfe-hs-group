  # ─────────────────────────────────────────────
  # API GATEWAY SERVICE (not implemented yet — uncomment when ready)
  # ─────────────────────────────────────────────
  # gateway-service:
  #   build: ./gateway-service
  #   container_name: security-gateway
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     RSS_COLLECTOR_URL: http://rss-collector-service:8081
  #     NORMALIZATION_URL: http://normalization-service:8082
