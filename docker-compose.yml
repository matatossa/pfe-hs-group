version: '3.8'

networks:
  security-net:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:

services:
  # ─────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: security-postgres
    environment:
      POSTGRES_DB: security_platform
      POSTGRES_USER: secadmin
      POSTGRES_PASSWORD: secpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - security-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secadmin -d security_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # ELASTICSEARCH
  # ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: security-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - security-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # FILTERING SERVICE (Python FastAPI + NLP)
  # ─────────────────────────────────────────────
  filtering-service:
    build: ./filtering-service
    container_name: security-filtering
    ports:
      - "5000:5000"
    networks:
      - security-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # NORMALIZATION SERVICE
  # ─────────────────────────────────────────────
  normalization-service:
    build: ./normalization-service
    container_name: security-normalization
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_platform
      SPRING_DATASOURCE_USERNAME: secadmin
      SPRING_DATASOURCE_PASSWORD: secpassword123
      FILTERING_SERVICE_URL: http://filtering-service:5000
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      filtering-service:
        condition: service_healthy
    networks:
      - security-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # RSS COLLECTOR SERVICE
  # ─────────────────────────────────────────────
  rss-collector-service:
    build: ./rss-collector-service
    container_name: security-rss-collector
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_platform
      SPRING_DATASOURCE_USERNAME: secadmin
      SPRING_DATASOURCE_PASSWORD: secpassword123
      NORMALIZATION_SERVICE_URL: http://normalization-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      normalization-service:
        condition: service_started
    networks:
      - security-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # RISK ENGINE SERVICE
  # ─────────────────────────────────────────────
  risk-engine-service:
    build: ./risk-engine-service
    container_name: security-risk-engine
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_platform
      SPRING_DATASOURCE_USERNAME: secadmin
      SPRING_DATASOURCE_PASSWORD: secpassword123
    depends_on:
      postgres:
        condition: service_healthy
      normalization-service:
        condition: service_started
    networks:
      - security-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API GATEWAY SERVICE
  # ─────────────────────────────────────────────
  gateway-service:
    build: ./gateway-service
    container_name: security-gateway
    ports:
      - "8080:8080"
    environment:
      RSS_COLLECTOR_URL: http://rss-collector-service:8081
      NORMALIZATION_URL: http://normalization-service:8082
      RISK_ENGINE_URL: http://risk-engine-service:8083
      JWT_SECRET: s3cur1tyPlatformSecretKey2024!xYzAbcDef
    depends_on:
      - normalization-service
      - rss-collector-service
      - risk-engine-service
    networks:
      - security-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # REACT FRONTEND
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: security-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-service
    networks:
      - security-net
    restart: unless-stopped
