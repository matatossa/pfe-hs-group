version: '3.8'

networks:
  security-net:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:

services:
  # ─────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: security-postgres
    environment:
      POSTGRES_DB: security_platform
      POSTGRES_USER: secadmin
      POSTGRES_PASSWORD: secpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - security-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secadmin -d security_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # ELASTICSEARCH
  # ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: security-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - security-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # ZOOKEEPER (Kafka dependency)
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: security-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - security-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: security-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - security-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # EUREKA SERVICE REGISTRY
  # ─────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: security-eureka
    ports:
      - "8761:8761"
    networks:
      - security-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────
  # FILTERING SERVICE (Python FastAPI + NLP)
  # ─────────────────────────────────────────────
  filtering-service:
    build: ./filtering-service
    container_name: security-filtering
    ports:
      - "5000:5000"
    networks:
      - security-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # NORMALIZATION SERVICE
  # ─────────────────────────────────────────────
  normalization-service:
    build: ./normalization-service
    container_name: security-normalization
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_platform
      SPRING_DATASOURCE_USERNAME: secadmin
      SPRING_DATASOURCE_PASSWORD: secpassword123
      FILTERING_SERVICE_URL: http://filtering-service:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      filtering-service:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - security-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # RSS COLLECTOR SERVICE
  # ─────────────────────────────────────────────
  rss-collector-service:
    build: ./rss-collector-service
    container_name: security-rss-collector
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_platform
      SPRING_DATASOURCE_USERNAME: secadmin
      SPRING_DATASOURCE_PASSWORD: secpassword123
      NORMALIZATION_SERVICE_URL: http://normalization-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      COLLECTOR_TIMEOUT_SECONDS: 45
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      normalization-service:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - security-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # RISK ENGINE SERVICE (not implemented yet — uncomment when ready)
