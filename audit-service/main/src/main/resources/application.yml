# ════════════════════════════════════════════════════════════════
# audit-service — application.yml
# Spring Boot 3.2 | PostgreSQL | Kafka | Eureka | Port 8084
# ════════════════════════════════════════════════════════════════

server:
  port: 8084

spring:
  application:
    name: audit-service

  # ── PostgreSQL ─────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/security_platform}
    username: ${SPRING_DATASOURCE_USERNAME:secadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:secpassword123}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuditPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update          # Crée/màj les tables audit_* au démarrage
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      retries: 3
      properties:
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000
        spring.json.add.type.headers: false
    consumer:
      group-id: audit-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.hsgroup.audit.dto"

  # ── Jackson ────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ── Eureka Client ──────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    health-check-url-path: /actuator/health
    metadata-map:
      version: "3.0.0"
      framework: "NIST CSF 2.0"

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# ── Info ───────────────────────────────────────────────────
info:
  app:
    name: audit-service
    version: 3.0.0
    description: "H&S Group — Audit NIST CSF 2.0"

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    com.hsgroup.audit: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── Custom app properties ───────────────────────────────────
audit:
  kafka:
    topic:
      events: audit-events
      jira:   jira-ticket-requests
  jira:
    service-url: ${JIRA_SERVICE_URL:http://jira-service:8085}
    default-project: ${JIRA_DEFAULT_PROJECT:CYBER}
  cors:
    allowed-origins: >
      http://localhost:3000,
      http://localhost:5173,
      http://security-frontend