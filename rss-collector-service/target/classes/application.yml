server:
  port: 8081

spring:
  application:
    name: rss-collector-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/security_platform}
    username: ${SPRING_DATASOURCE_USERNAME:secadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:secpassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Kafka Configuration ──────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        retry.backoff.ms: 1000

# ── Kafka Topics ─────────────────────────────────
kafka:
  topic:
    raw-feeds: raw-feed-items

# ── Collector Configuration ──────────────────────────
collector:
  cron: "0 */30 * * * *"          # every 30 minutes
  timeout-seconds: 30
  retry-max-attempts: 3
  retry-delay-ms: 2000

# ── Downstream Services ─────────────────────────────
services:
  normalization-url: ${NORMALIZATION_SERVICE_URL:http://localhost:8082}

# ── Actuator ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.security.platform.rsscollector: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.springframework.web.reactive: WARN

# ── Eureka Client ─────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
